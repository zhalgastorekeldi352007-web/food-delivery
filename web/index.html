<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAfood - Food Delivery</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="container">
            <div class="logo">
                <h1>🍕 ZAfood</h1>
                <p>Delicious Food Delivery</p>
            </div>
            <div class="cart-icon" onclick="toggleCart()">
                🛒 <span id="cartCount">0</span>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <h2>Delicious Food Delivery</h2>
            <p>Fast, Hot, With Love ❤️</p>
        </div>
    </section>

    <!-- Menu Section -->
    <section class="menu">
        <div class="container">
            <h2>Our Menu</h2>
            <div class="category-filter">
                <button class="filter-btn active" onclick="filterCategory('all')">All</button>
                <button class="filter-btn" onclick="filterCategory('pizza')">🍕 Pizza</button>
                <button class="filter-btn" onclick="filterCategory('burger')">🍔 Burgers</button>
                <button class="filter-btn" onclick="filterCategory('sushi')">🍣 Sushi</button>
                <button class="filter-btn" onclick="filterCategory('drinks')">🥤 Drinks</button>
            </div>
            <div class="menu-grid" id="menuGrid">
                <!-- Menu items will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Cart Sidebar -->
    <div id="cartSidebar" class="cart-sidebar">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button class="close-cart" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items" id="cartItems">
            <!-- Cart items will be displayed here -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cartTotal">0 ₸</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">Checkout</button>
        </div>
    </div>

    <!-- Overlay -->
    <div id="overlay" class="overlay" onclick="toggleCart()"></div>

    <!-- Order Modal -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Order Confirmed! 🎉</h2>
            <p id="orderMessage"></p>
            <button onclick="closeModal()">Continue Shopping</button>
        </div>
    </div>

    <script src="js/menu.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
