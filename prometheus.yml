global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'order'
    static_configs:
      - targets: ['order:8081']
  - job_name: 'payment'
    static_configs:
      - targets: ['payment:8082']
  - job_name: 'delivery'
    static_configs:
      - targets: ['delivery:8083']
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:8080']
